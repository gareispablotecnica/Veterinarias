{% extends 'Base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow p-5">
                <img src="{% static 'Clinica/img/confirm-icon.svg' %}" alt="Confirmación" height="100" class="mb-3">
                <h3 class="fw-bold">{{ Mensaje }}</h3>
                <p class="text-muted mt-3">La operación se realizó correctamente</p>
                <div class="mt-4">
                    <a href="{% url 'VerMascotas' %}" class="btn btn-primary me-2">
                        <i class="bi bi-grid-fill"></i> Ver Mascotas
                    </a>
                    <a href="{% url 'Home' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-house-fill"></i> Inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
